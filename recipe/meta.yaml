{% set name = "readimc" %}
{% set version = "0.9.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/readimc-{{ version }}.tar.gz
  sha256: f6851d46d3b80a433c0ac2ff829043e1caefb31b3f03e4b3e710bebcc0d4db88

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools_scm
  run:
    - imageio
    - numpy
    - pandas
    - python >=3.8

test:
  imports:
    - readimc
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/BodenmillerGroup/readimc
  summary: Read Imaging Mass Cytometry files
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jwindhager
